# SmartCloud folder sync configuration
# Format: LOCAL_PATH -> REMOTE_PATH
# REMOTE_PATH is relative to REMOTE_BASE_PATH from config.sh

# Example custom destination folders
# /home/user/Music     -> Music
# /home/user/Documents -> Documents

# Add your folders below:
# LOCAL_PATH -> REMOTE_PATH
# --------------------------

# Example placeholders
# /home/user/Documents -> Documents
# /home/user/Music     -> Music
# /home/user/Pictures  -> Pictures

# --------------------------
# Global exclusions
EXCLUDE:
Downloads/**
.cache/**
.local/**
*.part
*.torrent
node_modules/**
*.tmp
.snap/**
.local/share/Trash/**
*.thumbnails
*temp*/**
*thumbnails*/**
*steam*/**